<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactez Moi</title>
    <meta name="description" content="Formulaire de contact.">
    <link rel="icon" href="../image/headicon.jpg">
    <link rel="stylesheet" href="../Pages_CSS/global.css">
    <link rel="stylesheet" href="../Pages_CSS/contact.css">
  </head>

  <body>
    <header>
      <a href="../index.html" class="logo">Mon portfolio</a>

      <button class="hamburger" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="main-nav">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav id="main-nav" aria-label="Navigation principale">
        <ul>
          <li><a href="../index.html">Accueil</a></li>
          <li><a href="Apropos.html">Mon Profil</a></li>
          <li><a href="Projets.html">Projets</a></li>
          <li><a href="Contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="Contact">

        <section id="info">
          <h2>Retrouvez-moi ici :</h2>
          <ul>
            <li>noam.driaqn@gmail.com</li>
            <li>
            <a href="https://www.linkedin.com/in/noam-diouri-adequin-249b5239b" target="_blank" rel="noopener noreferrer" class="social-btn linkedin">
              <img src="../image/linkedin.png" alt="Logo LinkedIn">
              <span>LinkedIn</span>
            </a>
          </li>

          <li>
            <a href="https://github.com/noamdriaqn-commits" target="_blank" rel="noopener noreferrer" class="social-btn github">
              <img src="../image/github.png" alt="Logo GitHub">
              <span>GitHub</span>
            </a>
          </li>
          </ul>

          <br><br>
          <h2>Téléchargez mon CV</h2>
          <a href="../fichiers_annexes/DIOURIADEQUINNOAM-cv.pdf" download class="btn-cv" target="_blank" rel="noopener noreferrer">Télécharger mon CV</a>
        </section>

        <section id="formulaire">
          <h2>Contactez-moi</h2>
          <form action="https://formspree.io/f/https://formspree.io/f/xzdonvba" method="POST">

            <div class="form-group">
              <label for="email">Adresse email <span aria-hidden="true">*</span></label>
              <input type="email" id="email" name="email"
                     placeholder="exemple@mail.com" required>
            </div>

            <div class="form-group">
              <label for="objet">Objet <span aria-hidden="true">*</span></label>
              <input type="text" id="objet" name="objet"
                     placeholder="Objet de votre message" required>
            </div>

            <div class="form-group">
              <label for="message">Message <span aria-hidden="true">*</span></label>
              <textarea id="message" name="message"
                        placeholder="Votre message..." required></textarea>
            </div>

            <button type="submit">Envoyer</button>
          </form>
        </section>

      </section>
    </main>

    <script>
      const btn = document.querySelector('.hamburger');
      const nav = document.querySelector('nav');

      btn.addEventListener('click', () => {
        const isOpen = nav.classList.toggle('open');
        btn.setAttribute('aria-expanded', isOpen);
      });

      nav.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          nav.classList.remove('open');
          btn.setAttribute('aria-expanded', 'false');
        });
      });
    </script>
  </body>
</html>
