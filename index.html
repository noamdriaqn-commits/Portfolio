<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon portfolio</title>
    <meta name="description" content="Site web personnel présentant mon portfolio et un formulaire de contact.">
    <link rel="icon" href="image/headicon.jpg">
    <link rel="stylesheet" href="Pages_CSS/global.css">
    <link rel="stylesheet" href="Pages_CSS/index.css">
  </head>

  <body>
    <header>
      
      <button class="hamburger" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="main-nav">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav id="main-nav" aria-label="Navigation principale">
        <ul>
          <li><a href="index.html">Accueil</a></li>
          <li><a href="Pages_HTML/Apropos.html">Mon Profil</a></li>
          <li><a href="Pages_HTML/Projets.html">Projets</a></li>
          <li><a href="Pages_HTML/Contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="texte">
        <section id="titre">
          <h1>Noam Diouri--Adequin</h1>
        </section>
        <p>Je suis étudiant en BUT Informatique (2025-2028), et j'ai pour ambition de devenir développeur application.</p>
        <p>Ce portfolio représente pour vous une manière de découvrir mon profil et mes créations.</p>
      </section>
    </main>

    <script>
      const btn = document.querySelector('.hamburger');
      const nav = document.querySelector('nav');

      btn.addEventListener('click', () => {
        const isOpen = nav.classList.toggle('open');
        btn.setAttribute('aria-expanded', isOpen);
      });

      // Ferme le menu au clic sur un lien
      nav.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          nav.classList.remove('open');
          btn.setAttribute('aria-expanded', 'false');
        });
      });
    </script>
  </body>
</html>
